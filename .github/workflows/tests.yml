name: CI - Sistema de Pagos (TDD)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  go-tests:
    name: Pruebas Unitarias y Cobertura - Go
    runs-on: ubuntu-latest

    steps:
      - name: Obtener código fuente
        uses: actions/checkout@v4

      - name: Configurar Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Descargar dependencias
        run: go mod download

      - name: Ejecutar pruebas unitarias con cobertura
        run: go test ./src/payment/... -v -coverprofile=coverage.out -covermode=atomic

      - name: Mostrar reporte de cobertura por función
        run: go tool cover -func=coverage.out

      - name: Mostrar resumen de cobertura por paquete
        run: |
          echo "Cobertura por paquete:"
          go test ./src/payment/... -cover

      - name: Validar cobertura mínima (tax 100%, processor ≥80%)
        run: |
          TAX_COV=$(go test ./src/payment/tax/... -cover 2>&1 | grep -oE '[0-9]+\.[0-9]+%' | head -1 | tr -d '%')
          PROC_COV=$(go test ./src/payment/processor/... -cover 2>&1 | grep -oE '[0-9]+\.[0-9]+%' | head -1 | tr -d '%')
          REF_COV=$(go test ./src/payment/refund/... -cover 2>&1 | grep -oE '[0-9]+\.[0-9]+%' | head -1 | tr -d '%')

          echo "tax        : ${TAX_COV}%"
          echo "processor  : ${PROC_COV}%"
          echo "refund     : ${REF_COV}%"

          if (( $(echo "$TAX_COV < 100" | bc -l) )); then
            echo "❌ tax coverage (${TAX_COV}%) debe ser 100%"
            exit 1
          fi
          if (( $(echo "$PROC_COV < 80" | bc -l) )); then
            echo "❌ processor coverage (${PROC_COV}%) debe ser ≥ 80%"
            exit 1
          fi
          echo "✅ Coberturas mínimas satisfechas"

      - name: Generar reporte HTML de cobertura
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Subir reporte de cobertura como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.html
          retention-days: 7